<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Karla:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --maroon: #5e1b2a;
        --maroon-deep: #3e101b;
        --gold: #c8a24a;
        --gold-soft: #e7d2a0;
        --cream: #fbf4e6;
        --ink: #2b1b12;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "Karla", sans-serif;
        background: var(--cream);
        color: var(--ink);
        overflow-x: hidden;
      }
      h1,
      h2,
      h3,
      .display {
        font-family: "Cormorant Garamond", serif;
      }

      /* ---------- Placeholder-aware media ---------- */
      .ph-media {
        position: relative;
        width: 100%;
        overflow: hidden;
        background: linear-gradient(135deg, var(--gold-soft), var(--cream));
      }
      .ph-media img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .ph-media::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          100deg,
          var(--maroon-deep) 45%,
          var(--gold) 100%
        );
        transform-origin: left center;
        transform: scaleX(1);
        transition: transform 1s cubic-bezier(0.7, 0, 0.15, 1);
        z-index: 3;
        pointer-events: none;
      }
      .ph-media.curtain-open::after {
        transform: scaleX(0);
      }
      .ph-media.no-curtain::after {
        display: none;
      }
      .ph-fallback {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 2px dashed var(--gold);
        color: var(--maroon);
        text-align: center;
        padding: 20px;
        background:
          repeating-linear-gradient(
            45deg,
            rgba(94, 27, 42, 0.05) 0 12px,
            rgba(200, 162, 74, 0.05) 12px 24px
          ),
          var(--cream);
      }
      .ph-fallback .lbl {
        font-size: 11px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        opacity: 0.75;
      }
      .ph-fallback .path {
        font-family: monospace;
        font-size: 11px;
        background: rgba(94, 27, 42, 0.06);
        padding: 3px 8px;
        border-radius: 4px;
      }

      /* ---------- Nav ---------- */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        justify-content: center;
        gap: clamp(10px, 3vw, 36px);
        padding: 16px 4vw;
        background: rgba(62, 16, 27, 0.92);
        backdrop-filter: blur(6px);
      }
      nav button {
        background: none;
        border: none;
        color: var(--gold-soft);
        font-family: "Karla", sans-serif;
        font-size: 12px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        cursor: pointer;
        padding: 6px 2px;
        border-bottom: 2px solid transparent;
        transition:
          color 0.25s ease,
          border-color 0.25s ease;
      }
      nav button:hover,
      nav button.active {
        color: var(--cream);
        border-bottom-color: var(--gold);
      }

      /* ---------- Hero ---------- */
      .hero {
        position: relative;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 3rem 1.5rem;
        overflow: hidden;
      }
      .hero .ph-media {
        position: absolute;
        inset: 0;
        height: 100%;
        z-index: 0;
      }
      .hero .ph-media::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(62, 16, 27, 0.4),
          rgba(62, 16, 27, 0.75)
        );
        z-index: 1;
      }
      .hero .content {
        position: relative;
        z-index: 2;
        color: var(--cream);
      }
      .petal-field {
        position: absolute;
        inset: 0;
        z-index: 2;
        overflow: hidden;
        pointer-events: none;
      }
      .petal {
        position: absolute;
        top: -6%;
        opacity: 0;
        animation: petalFall linear forwards;
      }
      .petal svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      @keyframes petalFall {
        0% {
          opacity: 0;
          transform: translateY(0) translateX(0) rotate(0deg);
        }
        8% {
          opacity: 0.85;
        }
        92% {
          opacity: 0.7;
        }
        100% {
          opacity: 0;
          transform: translateY(112vh) translateX(var(--drift, 40px))
            rotate(300deg);
        }
      }
      .eyebrow {
        letter-spacing: 4px;
        font-size: 12px;
        color: var(--gold-soft);
        text-transform: uppercase;
        margin-bottom: 18px;
        opacity: 0;
        animation: fadeUp 1s ease forwards;
      }
      .hero h1 {
        font-size: clamp(48px, 10vw, 96px);
        font-weight: 500;
        line-height: 1.05;
        opacity: 0;
        animation: fadeUp 1.1s ease forwards;
        animation-delay: 0.15s;
      }
      .hero .amp {
        display: block;
        font-style: italic;
        font-size: clamp(28px, 5vw, 46px);
        color: var(--gold);
        margin: 6px 0;
      }
      .hero .sub {
        margin-top: 22px;
        font-size: 15px;
        letter-spacing: 1px;
        color: var(--gold-soft);
        opacity: 0;
        animation: fadeUp 1.2s ease forwards;
        animation-delay: 0.3s;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .navhint {
        margin-top: 40px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        opacity: 0;
        animation: fadeUp 1.3s ease forwards;
        animation-delay: 0.5s;
      }
      .navhint button {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(231, 210, 160, 0.35);
        color: var(--gold-soft);
        padding: 9px 18px;
        border-radius: 20px;
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.25s ease;
      }
      .navhint button:hover {
        background: rgba(255, 255, 255, 0.16);
      }

      
      @keyframes breathe {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(200, 162, 74, 0.35);
        }
        50% {
          box-shadow: 0 0 0 14px rgba(200, 162, 74, 0);
        }
      }
      

      /* ---------- Divider ---------- */
      .divider {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 50px 20px 10px;
      }
      .divider span {
        width: 60px;
        height: 1px;
        background: var(--gold);
      }
      .divider svg {
        width: 22px;
        height: 22px;
        fill: var(--gold);
      }

      section {
        padding: 90px 6vw 80px;
        max-width: 1000px;
        margin: 0 auto;
        scroll-margin-top: 70px;
      }
      .label {
        text-align: center;
        letter-spacing: 3px;
        font-size: 12px;
        text-transform: uppercase;
        color: var(--maroon);
        opacity: 0.7;
        margin-bottom: 8px;
      }
      .heading {
        text-align: center;
        font-size: clamp(30px, 5vw, 44px);
        font-weight: 500;
        color: var(--maroon-deep);
        margin-bottom: 28px;
      }

      /* ---------- Reveal ---------- */
      .reveal {
        opacity: 0;
        transform: translateY(46px);
        transition:
          opacity 0.9s cubic-bezier(0.2, 0.7, 0.2, 1),
          transform 0.9s cubic-bezier(0.2, 0.7, 0.2, 1);
      }
      .reveal.in-view {
        opacity: 1;
        transform: translateY(0);
      }
      .reveal-delay-1.in-view {
        transition-delay: 0.12s;
      }
      .reveal-delay-2.in-view {
        transition-delay: 0.24s;
      }

      /* ---------- Venue ---------- */
      .venue-photo {
        height: clamp(280px, 40vw, 420px);
        border-radius: 8px;
        margin-top: 10px;
      }
      .venue-card {
        background: #fff;
        border: 1px solid rgba(94, 27, 42, 0.12);
        border-radius: 8px;
        padding: 36px 30px;
        text-align: center;
        max-width: 560px;
        margin: 30px auto 0;
        cursor: pointer;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }
      .venue-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 16px 30px rgba(94, 27, 42, 0.12);
      }
      .venue-card h3 {
        font-size: 26px;
        color: var(--maroon-deep);
        margin-bottom: 6px;
        font-weight: 500;
      }
      .venue-card p {
        font-size: 14px;
        color: #5a4736;
        line-height: 1.7;
        margin-bottom: 10px;
      }
      .venue-card .go {
        display: inline-block;
        background: var(--maroon-deep);
        color: var(--cream);
        padding: 11px 26px;
        border-radius: 20px;
        font-size: 12px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-top: 8px;
      }

      /* ---------- Countdown ---------- */
      .countdown {
        display: flex;
        justify-content: center;
        gap: clamp(12px, 4vw, 32px);
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .cbox {
        background: #fff;
        border: 1px solid rgba(94, 27, 42, 0.12);
        border-radius: 8px;
        padding: 24px 22px;
        text-align: center;
        min-width: 90px;
      }
      .cbox .num {
        font-family: "Cormorant Garamond", serif;
        font-size: 42px;
        font-weight: 600;
        color: var(--maroon-deep);
        line-height: 1;
        transition:
          transform 0.25s ease,
          color 0.25s ease;
      }
      .cbox .num.tick {
        transform: scale(1.12);
        color: var(--gold);
      }
      .cbox .unit {
        font-size: 11px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--maroon);
        margin-top: 6px;
        display: block;
      }

      /* ---------- Couple ---------- */
      .couple-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        margin-top: 10px;
      }
      .person {
        background: #fff;
        border: 1px solid rgba(94, 27, 42, 0.12);
        border-radius: 8px;
        overflow: hidden;
        cursor: pointer;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }
      .person:hover {
        transform: translateY(-6px);
        box-shadow: 0 16px 30px rgba(94, 27, 42, 0.12);
      }
      .person .ph-media {
        height: 280px;
      }
      .person .body {
        padding: 24px 22px;
        text-align: center;
      }
      .person h3 {
        font-size: 24px;
        color: var(--maroon-deep);
        margin-bottom: 6px;
        font-weight: 500;
      }
      .person .role {
        font-size: 12px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 14px;
      }
      .person p {
        font-size: 14px;
        color: #5a4736;
        line-height: 1.7;
      }

      .story-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 36px;
        align-items: center;
        margin-top: 56px;
      }
      .story-row:nth-child(odd) .story-media {
        order: 2;
      }
      .story-media .ph-media {
        height: 280px;
        border-radius: 8px;
      }
      .story-text .year {
        font-size: 11px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 8px;
        display: block;
      }
      .story-text h4 {
        font-size: 26px;
        color: var(--maroon-deep);
        margin-bottom: 8px;
        font-weight: 500;
      }
      .story-text p {
        color: #5a4736;
        line-height: 1.7;
        font-size: 15px;
      }

      /* ---------- Events ---------- */
      .timeline {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        margin-top: 10px;
      }
      .tcard {
        background: #fff;
        border: 1px solid rgba(94, 27, 42, 0.12);
        border-radius: 8px;
        overflow: hidden;
        text-align: center;
        cursor: pointer;
        transition:
          transform 0.35s ease,
          box-shadow 0.35s ease;
      }
      .tcard:hover {
        transform: translateY(-6px);
        box-shadow: 0 16px 30px rgba(94, 27, 42, 0.12);
      }
      .tcard .ph-media {
        height: 160px;
      }
      .tcard .body {
        padding: 24px 20px;
      }
      .tcard h3 {
        font-size: 22px;
        color: var(--maroon-deep);
        margin-bottom: 8px;
        font-weight: 500;
      }
      .tcard p {
        font-size: 14px;
        color: #5a4736;
        line-height: 1.6;
      }
      .tcard .time {
        font-size: 12px;
        letter-spacing: 1px;
        color: var(--maroon);
        text-transform: uppercase;
        margin-top: 10px;
        display: block;
      }
      .tcard .go {
        margin-top: 14px;
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--maroon);
        border-bottom: 1px solid var(--gold);
        display: inline-block;
      }

      /* ---------- Arch divider draw-in ---------- */
      .arch-divider svg path {
        stroke-dasharray: 280;
        stroke-dashoffset: 280;
        transition: stroke-dashoffset 1.4s cubic-bezier(0.3, 0.8, 0.2, 1);
      }
      .arch-divider.drawn svg path {
        stroke-dashoffset: 0;
      }

      footer {
    text-align: center;
    padding: 40px 20px 60px;
    color: var(--maroon);
    font-size: 13px;
    letter-spacing: 1px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

.website-contact {
  display: block;
  font-size: 11px;
  color: rgba(94, 27, 42, 0.7);
  text-decoration: none;
  white-space: nowrap;
  margin-top: 4px;
}

.website-contact:hover {
  color: var(--maroon-deep);
  }
  footer .display {
    font-size: 20px;
    color: var(--maroon-deep);
    margin-bottom: 6px;
  }

      @media (max-width: 760px) {
        .timeline {
          grid-template-columns: 1fr;
        }
        .couple-grid,
        .story-row {
          grid-template-columns: 1fr;
        }
        .story-row:nth-child(odd) .story-media {
          order: 0;
        }
        nav {
          gap: 14px;
          overflow-x: auto;
          justify-content: flex-start;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
        .petal-field {
          display: none;
        }
        .ph-media::after {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <nav id="nav">
      <button data-target="home" class="active">Home</button>
      <button data-target="venue">Venue</button>
      <button data-target="countdown">Countdown</button>
      <button data-target="couple">Couple</button>
      <button data-target="events">Events</button>
    </nav>

    <section class="hero" id="home">
      <div class="ph-media no-curtain" id="heroMedia"></div>
      <div class="petal-field" id="petalField"></div>
      <div class="content">
        <div class="eyebrow" id="heroEyebrow"></div>
        <h1 id="heroTitle"></h1>
        <div class="sub" id="heroSub"></div>
        <div class="navhint">
          <button data-target="venue">Venue</button>
          <button data-target="countdown">Countdown</button>
          <button data-target="couple">The couple</button>
          <button data-target="events">Events</button>
        </div>
      </div>
    </section>

    

    <div id="arch1"></div>

    <section id="venue">
      <div class="label">Where we'll celebrate</div>
      <h2 class="heading">The Venue</h2>
      <div class="ph-media venue-photo reveal" id="venueMedia"></div>
      <div class="venue-card reveal" id="venueCard">
        <h3 id="venueName"></h3>
        <p id="venueAddress"></p>
        <p id="venueCeremonyTime"></p>
        <p id="venueParkingNote"></p>
        <span class="go">Open in Google Maps ↗</span>
      </div>
    </section>

    <div id="arch2"></div>

    <section id="countdown">
      <div class="label">Save the date</div>
      <h2 class="heading">Counting down to forever</h2>
      <div class="countdown">
        <div class="cbox">
          <span class="num" id="cd-days">00</span><span class="unit">Days</span>
        </div>
        <div class="cbox">
          <span class="num" id="cd-hours">00</span
          ><span class="unit">Hours</span>
        </div>
        <div class="cbox">
          <span class="num" id="cd-mins">00</span
          ><span class="unit">Minutes</span>
        </div>
        <div class="cbox">
          <span class="num" id="cd-secs">00</span
          ><span class="unit">Seconds</span>
        </div>
      </div>
    </section>

    <div id="arch3"></div>

    <section id="couple">
      <div class="label">Our story</div>
      <h2 class="heading">The Couple</h2>
      <div class="couple-grid" id="coupleGrid"></div>
      <div id="storyContainer"></div>
    </section>

    <div id="arch4"></div>

    <section id="events">
      <div class="label">Event details</div>
      <h2 class="heading">Where to be, and when</h2>
      <div class="timeline" id="eventsGrid"></div>
    </section>

     <footer>
  <div class="display" id="footerNames"></div>
  <span id="footerLine"></span>

  <a href="tel:9071330429" class="website-contact">
    For Website Enquiries: 9071330429
  </a>
  <a href="tel:6366646844" class="website-contact">
    Invitation Cards &amp; Printing: Kings of Cards, Mysuru — 6366646844
  </a>
</footer>

    <script>
      const WEDDING_CONFIG = {
        brideName: "Pooja",
        groomName: "Vikram",
        tagline: "Together with their families",
        weddingDateDisplay: "14th February 2027",
        weddingDateISO: "2027-02-14T10:00:00+05:30",
        weddingCity: "Bengaluru",
        hashtag: "#PoojaAndVikram2027",
        hero: {
          image: "hero.png",
          imageLabel: "Hero photo of the couple",
        },
        venue: {
          name: "The Leela Palace, Bengaluru",
          address: "23 Airport Road, HAL 3rd Stage, Bengaluru, Karnataka",
          ceremonyTime: "Ceremony begins at 10:00 AM",
          parkingNote: "Valet parking available at the main entrance",
          image: "venue.png",
          imageLabel: "Photo of the venue",
          mapQuery: "The Leela Palace Bengaluru",
        },
        couple: {
          bride: {
            name: "Pooja",
            role: "The Bride",
            bio: "Pooja loves painting, weekend treks, and her family's Sunday lunches.",
            image: "bride.png",
          },
          groom: {
            name: "Vikram",
            role: "The Groom",
            bio: "Vikram is a coffee enthusiast, an amateur guitarist, and a lifelong dreamer.",
            image: "groom.png",
          },
          story: [
            {
              year: "2021",
              title: "How we met",
              text: "Pooja and Vikram met at a mutual friend's birthday party and talked all night.",
              image: "story-1.png",
              imageLabel: "The day they met",
            },
            {
              year: "2023",
              title: "The proposal",
              text: "Vikram proposed on a quiet evening by the lake, and Pooja said yes.",
              image: "story-2.png",
              imageLabel: "The proposal",
            },
          ],
        },
        events: [
          {
            name: "Mehendi",
            description: "An evening of henna, music, and celebration.",
            date: "12th February 2027",
            time: "5:00 PM onwards",
            image: "event-mehendi.png",
            mapQuery: "The Leela Palace Bengaluru",
          },
          {
            name: "Sangeet",
            description: "A night of dance, performances, and joy.",
            date: "13th February 2027",
            time: "7:00 PM onwards",
            image: "event-sangeet.png",
            mapQuery: "The Leela Palace Bengaluru",
          },
          {
            name: "Wedding Ceremony",
            description: "The main wedding ceremony and reception.",
            date: "14th February 2027",
            time: "10:00 AM onwards",
            image: "event-wedding.png",
            mapQuery: "The Leela Palace Bengaluru",
          },
        ],
      };
      const C = WEDDING_CONFIG;

      /* ---------- Text & basic content ---------- */
      document.title = `${C.brideName} & ${C.groomName} — Wedding Invitation`;
      document.getElementById("heroEyebrow").textContent = C.tagline;
      document.getElementById("heroTitle").innerHTML =
        `${C.brideName}<span class="amp">&amp;</span>${C.groomName}`;
      document.getElementById("heroSub").textContent =
        `${C.weddingDateDisplay} · ${C.weddingCity.toUpperCase()}`;
      document.getElementById("venueName").textContent = C.venue.name;
      document.getElementById("venueAddress").textContent = C.venue.address;
      document.getElementById("venueCeremonyTime").textContent =
        C.venue.ceremonyTime;
      document.getElementById("venueParkingNote").textContent =
        C.venue.parkingNote;
      document.getElementById("footerNames").textContent =
        `${C.brideName} & ${C.groomName}`;
      document.getElementById("footerLine").textContent =
        `${C.weddingDateDisplay} · ${C.weddingCity} · ${C.hashtag}`;

      const mapURL = (q) =>
        `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`;
      document
        .getElementById("venueCard")
        .addEventListener("click", () =>
          window.open(mapURL(C.venue.mapQuery), "_blank"),
        );

      /* ---------- Placeholder-aware media loader ---------- */
      function setMedia(el, src, label) {
        el.dataset.src = src;
        el.dataset.label = label || "";
        const img = new Image();
        img.onload = () => {
          el.innerHTML = "";
          const realImg = document.createElement("img");
          realImg.src = src;
          realImg.alt = label || "";
          el.appendChild(realImg);
        };
        img.onerror = () => {
          el.innerHTML = `<div class="ph-fallback">
      <div class="lbl">${label || "Image placeholder"}</div>
      <div class="path">${src}</div>
    </div>`;
        };
        img.src = src;
      }

      setMedia(
        document.getElementById("heroMedia"),
        C.hero.image,
        C.hero.imageLabel,
      );
      setMedia(
        document.getElementById("venueMedia"),
        C.venue.image,
        C.venue.imageLabel,
      );

      

      /* ---------- Couple cards (bride/groom) ---------- */
      const coupleGrid = document.getElementById("coupleGrid");
      [C.couple.bride, C.couple.groom].forEach((person) => {
        const card = document.createElement("div");
        card.className = "person";
        card.innerHTML = `
    <div class="ph-media"></div>
    <div class="body">
      <h3>${person.name}</h3>
      <div class="role">${person.role}</div>
      <p>${person.bio}</p>
    </div>`;
        coupleGrid.appendChild(card);
        setMedia(
          card.querySelector(".ph-media"),
          person.image,
          `${person.name} portrait`,
        );
        card.addEventListener("click", () => {
          if (window.sendPrompt)
            window.sendPrompt(
              `Tell me more about ${person.name} for the wedding invitation`,
            );
        });
      });

      /* ---------- Love story rows ---------- */
      const storyContainer = document.getElementById("storyContainer");
      C.couple.story.forEach((chapter, i) => {
        const row = document.createElement("div");
        row.className = `story-row reveal ${i % 2 ? "reveal-delay-1" : ""}`;
        row.innerHTML = `
    <div class="story-media"><div class="ph-media"></div></div>
    <div class="story-text">
      <span class="year">${chapter.year}</span>
      <h4>${chapter.title}</h4>
      <p>${chapter.text}</p>
    </div>`;
        storyContainer.appendChild(row);
        setMedia(
          row.querySelector(".ph-media"),
          chapter.image,
          chapter.imageLabel,
        );
      });

      

      /* ---------- Events ---------- */
      const eventsGrid = document.getElementById("eventsGrid");
      C.events.forEach((ev) => {
        const card = document.createElement("div");
        card.className = "tcard";
        card.innerHTML = `
    <div class="ph-media"></div>
    <div class="body">
      <h3>${ev.name}</h3>
      <p>${ev.description}</p>
      <span class="time">${ev.date} · ${ev.time}</span>
      <span class="go">Get directions ↗</span>
    </div>`;
        eventsGrid.appendChild(card);
        setMedia(card.querySelector(".ph-media"), ev.image, `${ev.name} photo`);
        card.addEventListener("click", () =>
          window.open(mapURL(ev.mapQuery), "_blank"),
        );
      });

      /* ---------- Nav: smooth scroll + active tracking ---------- */
      document
        .querySelectorAll("nav button, .navhint button")
        .forEach((btn) => {
          btn.addEventListener("click", () => {
            document
              .getElementById(btn.dataset.target)
              .scrollIntoView({ behavior: "smooth" });
          });
        });
      const sections = ["home", "venue", "countdown", "couple", "events"];
      window.addEventListener("scroll", () => {
        let current = sections[0];
        for (const id of sections) {
          const el = document.getElementById(id);
          if (el && el.getBoundingClientRect().top <= 120) current = id;
        }
        document
          .querySelectorAll("nav button")
          .forEach((b) =>
            b.classList.toggle("active", b.dataset.target === current),
          );
      });

      /* ---------- Countdown with pulse ---------- */
      const weddingDate = new Date(C.weddingDateISO);
      function setDigit(id, value) {
        const node = document.getElementById(id);
        const formatted = String(value).padStart(2, "0");
        if (node.textContent !== formatted) {
          node.textContent = formatted;
          node.classList.remove("tick");
          void node.offsetWidth;
          node.classList.add("tick");
        }
      }
      function updateCountdown() {
        const now = new Date();
        let diff = weddingDate - now;
        if (diff < 0) diff = 0;
        setDigit("cd-days", Math.floor(diff / (1000 * 60 * 60 * 24)));
        setDigit("cd-hours", Math.floor((diff / (1000 * 60 * 60)) % 24));
        setDigit("cd-mins", Math.floor((diff / (1000 * 60)) % 60));
        setDigit("cd-secs", Math.floor((diff / 1000) % 60));
      }
      updateCountdown();
      setInterval(updateCountdown, 1000);

      /* ---------- Scroll reveal + curtain wipe ---------- */
      const revealObserver = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (!entry.isIntersecting) return;
            const el = entry.target;
            if (el.classList.contains("reveal")) el.classList.add("in-view");
            if (el.classList.contains("ph-media"))
              el.classList.add("curtain-open");
            if (el.classList.contains("arch-divider"))
              el.classList.add("drawn");
            revealObserver.unobserve(el);
          });
        },
        { threshold: 0.15 },
      );
      document
        .querySelectorAll(".reveal, .ph-media:not(.no-curtain)")
        .forEach((el) => revealObserver.observe(el));

      /* ---------- Ambient floating petals ---------- */
      const prefersReducedMotion = window.matchMedia(
        "(prefers-reduced-motion: reduce)",
      ).matches;
      const petalField = document.getElementById("petalField");
      const petalSVG = `<svg viewBox="0 0 20 20"><path d="M10 2C14 2 17 6 17 10C17 14 14 18 10 18C6 18 3 14 3 10C3 6 6 2 10 2Z" fill="#C8A24A" opacity="0.7"/></svg>`;
      function spawnPetal() {
        if (!petalField || prefersReducedMotion) return;
        const petal = document.createElement("div");
        petal.className = "petal";
        const size = 8 + Math.random() * 10;
        petal.style.left = Math.random() * 100 + "%";
        petal.style.width = size + "px";
        petal.style.height = size + "px";
        petal.style.setProperty("--drift", Math.random() * 80 - 40 + "px");
        const duration = 9 + Math.random() * 7;
        petal.style.animationDuration = duration + "s";
        petal.innerHTML = petalSVG;
        petalField.appendChild(petal);
        setTimeout(() => petal.remove(), duration * 1000 + 200);
      }
      if (!prefersReducedMotion) {
        for (let i = 0; i < 5; i++) setTimeout(spawnPetal, i * 900);
        setInterval(spawnPetal, 1800);
      }

      /* ---------- Arch dividers ---------- */
      const archSVG = `<svg viewBox="0 0 200 70"><path d="M10 65 C10 20 190 20 190 65" stroke="#C8A24A" stroke-width="1.4" fill="none"/><circle cx="100" cy="18" r="3" fill="#C8A24A"/></svg>`;
      ["arch1", "arch2", "arch3", "arch4"].forEach((id) => {
        const container = document.getElementById(id);
        if (!container) return;
        const wrap = document.createElement("div");
        wrap.className = "divider arch-divider";
        wrap.innerHTML = archSVG;
        container.appendChild(wrap);
        revealObserver.observe(wrap);
      });

      /* Optional: hook for chat integration if this page is embedded in an
   environment that provides sendPrompt(text) — falls back to no-op. */
      window.sendPrompt = window.sendPrompt || function () {};
    </script>
  </body>
</html>
